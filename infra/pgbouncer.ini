[databases]
acp_registry = host=acp_postgres port=5432 dbname=acp_registry
acp_identity = host=acp_postgres port=5432 dbname=acp_identity
acp_audit = host=acp_postgres port=5432 dbname=acp_audit
acp_api = host=acp_postgres port=5432 dbname=acp_api
acp_usage = host=acp_postgres port=5432 dbname=acp_usage

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
# P3-4 FIX: Changed from 'md5' to 'plain'. 'md5' requires passwords as md5 hashes in
# userlist.txt but we store plaintext. Using 'plain' matches the userlist.txt format.
# In production, migrate to 'scram-sha-256' with properly hashed passwords.
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 10000
default_pool_size = 20
ignore_startup_parameters = extra_float_digits, statement_timeout
admin_users = postgres
# Allow all users for simplicity in this dev/test setup
# In real production, we'd have more restrictive userlist.txt
