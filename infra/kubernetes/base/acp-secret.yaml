apiVersion: v1
kind: Secret
metadata:
  name: acp-secrets
  namespace: acp
type: Opaque
data:
  # SECURITY: These values MUST be replaced before any deployment.
  # Generate with: openssl rand -base64 32 | base64
  # JWT_SECRET_KEY must be at least 32 bytes of cryptographically random data.
  # NEVER commit real secrets — use sealed-secrets, Vault, or AWS Secrets Manager.
  JWT_SECRET_KEY: REPLACE_WITH_BASE64_OF_OPENSSL_RAND_BASE64_32

  # POSTGRES_PASSWORD must differ per environment (dev/staging/prod).
  # Generate with: openssl rand -hex 16 | base64
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_OF_OPENSSL_RAND_HEX_16

  # REDIS_PASSWORD for requirepass authentication.
  # Generate with: openssl rand -hex 16 | base64
  REDIS_PASSWORD: REPLACE_WITH_BASE64_OF_OPENSSL_RAND_HEX_16

  # INTERNAL_SECRET shared between services for internal auth.
  # Generate with: openssl rand -base64 32 | base64
  INTERNAL_SECRET: REPLACE_WITH_BASE64_OF_OPENSSL_RAND_BASE64_32
